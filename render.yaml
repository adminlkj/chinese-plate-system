services:
  # ─── Web Service (Next.js Application) ──────────────────────────────────────
  - type: web
    name: chinese-plate-system
    runtime: node
    plan: starter
    # Node 22 LTS — Render supports up to 22.x
    nodeVersion: "22.4.0"
    buildCommand: npm install && node scripts/switch-to-postgres.js && npx prisma generate && npm run build
    startCommand: npx prisma db push --accept-data-loss && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: chinese-plate-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        fromService:
          name: chinese-plate-system
          type: web
          property: hosturl
      - key: DEFAULT_ADMIN_EMAIL
        value: admin@example.com
      - key: DEFAULT_ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_SEED_TOKEN
        generateValue: true
      - key: PORT
        value: "10000"
    healthCheckPath: /api/health

  # ─── PostgreSQL Database ───────────────────────────────────────────────────
  - type: postgres
    name: chinese-plate-db
    plan: starter
